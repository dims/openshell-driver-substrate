# Agent Substrate ActorTemplate that runs the patched openshell-sandbox
# supervisor under a gVisor (runsc) actor. The supervisor's standalone mode
# loads policy from local files baked into the image -- no gateway involved.
#
# Replace the image reference with the digest you get from
#   bash build-supervisor-image.sh
apiVersion: ate.dev/v1alpha1
kind: ActorTemplate
metadata:
  name: supervisor
  namespace: ate-openshell-m0
spec:
  containers:
  - name: supervisor
    image: REPLACE_WITH_DIGEST_REFERENCE
    command:
    - /usr/local/bin/openshell-sandbox
    - --policy-rules
    - /etc/openshell/policy.rego
    - --policy-data
    - /etc/openshell/data.yaml
    - --log-level
    - info
    - --
    - /bin/sh
    - -c
    - 'while true; do echo "[child] alive $(date -Iseconds)"; sleep 30; done'
    ports:
    - containerPort: 80
  pauseImage: registry.k8s.io/pause:3.10.2@sha256:f548e0e8e3dc1896ca956272154dde3314e8cc4fde0a57577ee9fa1c63f5baf4
  runsc:
    amd64:
      sha256Hash: a397be1abc2420d26bce6c70e6e2ff96c73aaaab929756c56f5e2089ea842b63
      url: gs://gvisor/releases/nightly/2026-05-19/x86_64/runsc
    arm64:
      sha256Hash: 1ba2366ae2efceba166046f51a4104f9261c9cb72c6db8f5b3fe2dc57dea86b9
      url: gs://gvisor/releases/nightly/2026-05-19/aarch64/runsc
  snapshotsConfig:
    location: gs://ate-snapshots/ate-openshell-m0/
  workerPoolRef:
    name: openshell-m0-pool
    namespace: ate-openshell-m0
