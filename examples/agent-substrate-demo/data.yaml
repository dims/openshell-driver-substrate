# Rego data file for running openshell-sandbox under Agent Substrate's gVisor
# actor. Not a real policy -- just the minimum settings needed to make the
# supervisor boot successfully without bypass-proof egress isolation.
#
# Companion to crates/openshell-sandbox/data/sandbox-policy.rego.
version: 1

filesystem_policy:
  include_workdir: true
  read_only:  [/usr, /lib, /lib64, /bin, /sbin, /proc, /dev/urandom, /etc, /var/log]
  read_write: [/tmp, /sandbox]

# best_effort: Landlock unavailability is logged + tolerated. Required under
# gVisor, which does not implement the Landlock LSM.
landlock:
  compatibility: best_effort

# run_as_user=root is required when the supervisor cannot drop privileges:
# Substrate's default gVisor actor does not grant CAP_SETUID/SETGID, and
# initgroups() will EPERM on any non-root target identity. The patched
# supervisor short-circuits drop_privileges when current==target, so this
# is effectively a "stay where you are" assertion.
process:
  run_as_user:  root
  run_as_group: root

# Empty policy: this demo does not exercise egress allow/deny. The HTTP_PROXY
# environment variable is still injected (pointing at the supervisor's own
# loopback proxy) for cooperative tools.
network_policies: {}
