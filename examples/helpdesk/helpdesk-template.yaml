apiVersion: v1
kind: Namespace
metadata:
  name: ate-demo-helpdesk
---
apiVersion: ate.dev/v1alpha1
kind: WorkerPool
metadata:
  name: helpdesk-pool
  namespace: ate-demo-helpdesk
spec:
  replicas: 2
  ateomImage: __ATEOM_IMAGE__
---
apiVersion: ate.dev/v1alpha1
kind: ActorTemplate
metadata:
  name: helpdesk-agent
  namespace: ate-demo-helpdesk
spec:
  pauseImage: registry.k8s.io/pause:3.10.2@sha256:f548e0e8e3dc1896ca956272154dde3314e8cc4fde0a57577ee9fa1c63f5baf4
  runsc:
    amd64:
      url: "gs://gvisor/releases/nightly/2026-05-19/x86_64/runsc"
      sha256Hash: "a397be1abc2420d26bce6c70e6e2ff96c73aaaab929756c56f5e2089ea842b63"
    arm64:
      url: "gs://gvisor/releases/nightly/2026-05-19/aarch64/runsc"
      sha256Hash: "1ba2366ae2efceba166046f51a4104f9261c9cb72c6db8f5b3fe2dc57dea86b9"
  containers:
  - name: supervisor
    image: __SUPERVISOR_IMAGE__
    command:
    - /usr/local/bin/openshell-sandbox
    - --policy-rules
    - /etc/openshell/policy.rego
    - --policy-data
    - /etc/openshell/data.yaml
    - --inference-routes
    - /etc/openshell/routes.yaml
    - --log-level
    - info
    - --
    - python3
    - /opt/helpdesk/agent.py
    env:
    # atelet's OCI bundle builder does not inherit the base image's ENV,
    # so we re-state OPENSHELL_BEST_EFFORT_FAILURES=1 explicitly here.
    - name: OPENSHELL_BEST_EFFORT_FAILURES
      value: "1"
    ports:
    - containerPort: 80
  workerPoolRef:
    namespace: ate-demo-helpdesk
    name: helpdesk-pool
  snapshotsConfig:
    location: gs://ate-snapshots/ate-demo-helpdesk/
