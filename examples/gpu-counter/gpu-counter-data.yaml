version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /etc
    - /opt/gpu-counter
  read_write:
    - /tmp
    - /dev/null
    # nvidia-container-cli configure bind-mounts these into the bundle;
    # Landlock must allow them so libcuda can ioctl through nvproxy.
    - /dev/nvidia0
    - /dev/nvidiactl
    - /dev/nvidia-uvm
    - /dev/nvidia-uvm-tools
    - /dev/nvidia-modeset

landlock:
  compatibility: best_effort

process:
  run_as_user: root
  run_as_group: root

network_policies: {}
