# Test-mode supervisor policy: exercise allow + deny + denied-binary
# decisions so the OPA pipeline is actually walked end-to-end.
version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /lib64, /bin, /sbin, /proc, /dev/urandom, /etc, /var/log]
  read_write: [/tmp, /sandbox]

# best_effort: Landlock unavailable under gVisor; logged + tolerated.
landlock:
  compatibility: best_effort

# Root for the same reason the M0 image used root: drop_privileges'
# idempotent fast-path skips the syscalls under reduced caps.
process:
  run_as_user: root
  run_as_group: root

# Two named policies so we can verify both an allow and a deny path
# through the OPA engine. The `binary_allowed` arm is exercised by
# curl which lives at /usr/bin/curl. Endpoint `ports` and binary
# `path` shapes match `policy.rego`'s endpoint_allowed / binary_allowed.
network_policies:
  allow-example-com:
    endpoints:
      - host: example.com
        ports: [80, 443]
    binaries:
      - path: /usr/bin/curl
  allow-loopback-http:
    endpoints:
      - host: 127.0.0.1
        ports: [3128]
    binaries:
      - path: /usr/bin/curl
